services:
  postgres:
    image: postgres:17

    container_name: logden-postgres

    environment:
      POSTGRES_DB: logden
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres-data: